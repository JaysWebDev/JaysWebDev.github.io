<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sector Breakdown — Spatial Curiosity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:           #060810;
  --surface:      #0b0f1a;
  --surface-2:    #101520;
  --surface-3:    #161d2e;
  --border:       #1c2640;
  --border-hi:    #253050;
  --text:         #9aa5be;
  --text-dim:     #404c65;
  --text-bright:  #d4dff5;
  --amber:        #c9940a;
  --amber-hi:     #f5b400;
  --amber-dim:    #7a5a06;
  --green:        #2dce7d;
  --yellow:       #e8b321;
  --red:          #f05252;
  --font-display: 'Bebas Neue', cursive;
  --font-mono:    'JetBrains Mono', monospace;
  --font-ui:      'Barlow', sans-serif;
  --radius:       4px;
  --gutter:       24px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13.5px;
  line-height: 1.6;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(201,148,10,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,148,10,.035) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--amber-hi), transparent);
  z-index: 100;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 var(--gutter);
  position: relative;
  z-index: 1;
}

/* ── HEADER ─────────────────────────────────────────────── */
header {
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(6,8,16,.98) 0%, rgba(11,15,26,.95) 100%);
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(12px);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
}

.nav-back {
  display: flex; align-items: center; gap: 8px;
  color: var(--amber);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  transition: color .2s;
}
.nav-back:hover { color: var(--amber-hi); }
.nav-back::before { content: '←'; font-size: 14px; }

.header-title { display: flex; align-items: baseline; gap: 16px; }

.header-title h1 {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: .06em;
  color: var(--text-bright);
  line-height: 1;
}

.header-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--amber);
  background: rgba(201,148,10,.1);
  border: 1px solid var(--amber-dim);
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: .1em;
}

.header-meta {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-dim);
  text-align: right;
  letter-spacing: .04em;
}
.header-meta span { display: block; color: var(--text); }

/* ── KPI CARDS ──────────────────────────────────────────── */
.kpi-section { padding: 28px 0 20px; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, transform .2s;
}
.kpi-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }
.kpi-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--amber); opacity: .4;
}
.kpi-card.highlight::after { opacity: 1; background: var(--green); }

.kpi-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.kpi-value {
  font-family: var(--font-display);
  font-size: 44px;
  line-height: 1;
  color: var(--amber-hi);
  letter-spacing: .02em;
}
.kpi-card.highlight .kpi-value { color: var(--green); font-size: 28px; }

.kpi-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 6px;
}

/* ── SECTION HEADERS ────────────────────────────────────── */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: .08em;
  color: var(--text-bright);
}

/* ── TWO COLUMN ─────────────────────────────────────────── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 0 0 28px;
}

.col-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
}

/* ── BAR TABLE ──────────────────────────────────────────── */
.bar-table { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }

.bar-row { display: flex; flex-direction: column; gap: 4px; }

.bar-row-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.bar-name {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--text-bright);
  font-weight: 500;
}

.bar-stats {
  display: flex;
  gap: 12px;
}

.bar-count {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--amber-hi);
  line-height: 1;
}

.bar-pct {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  align-self: center;
}

.bar-track {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 1px;
  transition: width .6s ease;
}

.bar-fill.group { background: var(--green); opacity: .7; }

/* ── CHART ──────────────────────────────────────────────── */
.chart-section { padding: 0 0 40px; }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.chart-wrap { position: relative; height: 300px; margin-top: 16px; }

/* ── LOADING ────────────────────────────────────────────── */
.loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  z-index: 200; transition: opacity .4s;
}
.loading-screen.hidden { opacity: 0; pointer-events: none; }
.loading-text {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-dim);
  letter-spacing: .14em; text-transform: uppercase;
}
.loading-bar {
  width: 200px; height: 1px;
  background: var(--border);
  position: relative; overflow: hidden;
}
.loading-bar::after {
  content: '';
  position: absolute; height: 100%; width: 40%;
  background: var(--amber-hi);
  animation: scan 1s ease-in-out infinite;
}
@keyframes scan { 0% { left: -40%; } 100% { left: 140%; } }

@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .two-col  { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loadScreen">
  <div class="loading-text">Loading sector data</div>
  <div class="loading-bar"></div>
</div>

<header>
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="nav-back">Spatial Curiosity</a>
      <div class="header-title">
        <h1>Sector Breakdown</h1>
        <span class="header-badge">INDUSTRY INTELLIGENCE</span>
      </div>
      <div class="header-meta">
        <span id="headerDate"></span>
        Business Intelligence Engine
      </div>
    </div>
  </div>
</header>

<main>
<div class="container">

  <!-- KPI Cards -->
  <section class="kpi-section">
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total Businesses</div>
        <div class="kpi-value" id="kpiTotal">—</div>
        <div class="kpi-sub">Indexed records</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Sectors Active</div>
        <div class="kpi-value" id="kpiSectors">—</div>
        <div class="kpi-sub">Industry sectors with data</div>
      </div>
      <div class="kpi-card highlight">
        <div class="kpi-label">Top Sector</div>
        <div class="kpi-value" id="kpiTopSector">—</div>
        <div class="kpi-sub" id="kpiTopCount">—</div>
      </div>
    </div>
  </section>

  <!-- Sector + Groups Tables -->
  <div class="two-col">
    <div class="col-card">
      <div class="section-head">
        <span class="section-title">By Sector</span>
      </div>
      <div class="bar-table" id="sectorTable"></div>
    </div>
    <div class="col-card">
      <div class="section-head">
        <span class="section-title">Top Industry Groups</span>
      </div>
      <div class="bar-table" id="groupTable"></div>
    </div>
  </div>

  <!-- Chart -->
  <section class="chart-section">
    <div class="chart-card">
      <div class="section-head">
        <span class="section-title">Sector Distribution</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">Sorted by business count</span>
      </div>
      <div class="chart-wrap">
        <canvas id="sectorChart"></canvas>
      </div>
    </div>
  </section>

</div>
</main>

<script>
function countUp(el, target, duration, fmt) {
  const start = performance.now();
  const tick = now => {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = fmt(target * ease);
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = fmt(target);
  };
  requestAnimationFrame(tick);
}

async function loadData() {
  try {
    const data = await fetch('data/summary.json').then(r => { if (!r.ok) throw new Error(); return r.json(); });

    document.getElementById('headerDate').textContent =
      new Date().toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });

    const sectors = data.by_sector || [];
    const groups  = data.top_groups || [];
    const total   = data.total_businesses || 0;
    const topSec  = sectors[0] || null;

    countUp(document.getElementById('kpiTotal'),   total,           800, v => Math.round(v).toLocaleString());
    countUp(document.getElementById('kpiSectors'), sectors.length,  600, v => Math.round(v));

    if (topSec) {
      document.getElementById('kpiTopSector').textContent = topSec.sector;
      document.getElementById('kpiTopCount').textContent  = topSec.count.toLocaleString() + ' businesses';
    }

    renderSectorTable(sectors, total);
    renderGroupTable(groups, total);
    renderChart(sectors);

    const loader = document.getElementById('loadScreen');
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 500);

  } catch (err) {
    document.getElementById('loadScreen').innerHTML =
      `<div class="loading-text" style="color:var(--red)">Failed to load data — run generate_reports.py first</div>`;
  }
}

function renderSectorTable(sectors, total) {
  if (!sectors.length) {
    document.getElementById('sectorTable').innerHTML =
      `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">No sector data available.</div>`;
    return;
  }
  const maxCount = Math.max(...sectors.map(s => s.count));

  document.getElementById('sectorTable').innerHTML = sectors.map(s => {
    const pct = total > 0 ? (s.count / total * 100).toFixed(1) : '0.0';
    const barW = maxCount > 0 ? (s.count / maxCount * 100).toFixed(1) : '0';
    return `
    <div class="bar-row">
      <div class="bar-row-header">
        <span class="bar-name">${s.sector}</span>
        <div class="bar-stats">
          <span class="bar-count">${s.count.toLocaleString()}</span>
          <span class="bar-pct">${pct}%</span>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${barW}%"></div></div>
    </div>`;
  }).join('');
}

function renderGroupTable(groups, total) {
  if (!groups.length) {
    document.getElementById('groupTable').innerHTML =
      `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">No group data available.</div>`;
    return;
  }
  const maxCount = Math.max(...groups.map(g => g.count));

  document.getElementById('groupTable').innerHTML = groups.map(g => {
    const pct = total > 0 ? (g.count / total * 100).toFixed(1) : '0.0';
    const barW = maxCount > 0 ? (g.count / maxCount * 100).toFixed(1) : '0';
    return `
    <div class="bar-row">
      <div class="bar-row-header">
        <span class="bar-name">${g.group}</span>
        <div class="bar-stats">
          <span class="bar-count" style="color:var(--green)">${g.count.toLocaleString()}</span>
          <span class="bar-pct">${pct}%</span>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill group" style="width:${barW}%"></div></div>
    </div>`;
  }).join('');
}

function renderChart(sectors) {
  const sorted = [...sectors].sort((a, b) => b.count - a.count);
  const ctx = document.getElementById('sectorChart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(s => s.sector),
      datasets: [{
        data: sorted.map(s => s.count),
        backgroundColor: 'rgba(201,148,10,.6)',
        borderColor: 'rgba(201,148,10,1)',
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0b0f1a', borderColor: '#1c2640', borderWidth: 1,
          titleColor: '#9aa5be', bodyColor: '#f5b400',
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont:  { family: 'JetBrains Mono', size: 13 },
          callbacks: {
            title: ctx => ctx[0].label,
            label: ctx => ctx.parsed.x.toLocaleString() + ' businesses',
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(28,38,64,.6)' },
          ticks: { color: '#4a5568', font: { family: 'JetBrains Mono', size: 10 } },
          beginAtZero: true,
        },
        y: {
          grid: { color: 'rgba(28,38,64,.4)' },
          ticks: { color: '#9aa5be', font: { family: 'JetBrains Mono', size: 10 } },
        }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
