  <!-- Bottom right: subtle tagline -->
  <text x="1120" y="590" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.25)" text-anchor="end">Building intelligent tools</text>
