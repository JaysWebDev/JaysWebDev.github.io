<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3493426366115346"
         crossorigin="anonymous"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDGAR Fundamentals</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card2: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
    --text: #e6edf3;
    --muted: #8b949e;
    --mono: 'Courier New', 'Lucida Console', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .breadcrumb { color: var(--muted); font-size: 13px; }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { color: var(--muted); font-size: 12px; margin-left: auto; }

  /* ── Main layout ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* ── Search section ── */
  .search-wrap { text-align: center; padding: 32px 0 24px; }
  .search-row { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; }
  .ticker-input { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 22px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 12px 20px; border-radius: 8px; width: 200px; text-align: center; outline: none; transition: border-color .15s; }
  .ticker-input:focus { border-color: var(--accent); }
  .ticker-input::placeholder { color: var(--border); font-size: 16px; letter-spacing: 1px; }
  select.form-select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 8px; font-size: 14px; outline: none; cursor: pointer; }
  .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .15s, transform .1s; }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--accent); color: #0d1117; }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .refresh-row { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 10px; font-size: 13px; color: var(--muted); }
  .refresh-row input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
  .recent-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 14px; min-height: 28px; }
  .chip { background: var(--card2); border: 1px solid var(--border); color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 100px; cursor: pointer; transition: background .12s; letter-spacing: 1px; }
  .chip:hover { background: var(--border); }

  /* ── DCF Assumptions panel ── */
  .assumptions-wrap { margin-bottom: 20px; }
  .assumptions-toggle { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: color .12s, border-color .12s; }
  .assumptions-toggle:hover { color: var(--text); border-color: var(--muted); }
  .assumptions-toggle .arrow { transition: transform .2s; display: inline-block; }
  .assumptions-toggle.open .arrow { transform: rotate(90deg); }
  .assumptions-panel { display: none; margin-top: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .assumptions-panel.open { display: block; }
  .assumptions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .field input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 5px; font-size: 13px; font-family: var(--mono); outline: none; width: 100%; }
  .field input:focus { border-color: var(--accent); }

  /* ── Loading / Error ── */
  .loading { text-align: center; padding: 60px 20px; display: none; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .error-banner { background: rgba(248,81,73,.12); border: 1px solid var(--danger); color: var(--danger); padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 13px; }

  /* ── Results ── */
  #results { display: none; }

  /* Summary bar */
  .summary-bar { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
  .summary-item { flex: 1; padding: 12px 16px; border-right: 1px solid var(--border); }
  .summary-item:last-child { border-right: none; }
  .summary-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .summary-val { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--accent); }

  /* Flags */
  .flags-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .flag { background: rgba(210,153,34,.12); border: 1px solid rgba(210,153,34,.4); color: var(--warn); padding: 5px 12px; border-radius: 100px; font-size: 12px; }

  /* Cards */
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; }
  @media(max-width:900px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }

  .kv-list { display: flex; flex-direction: column; gap: 6px; }
  .kv { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid rgba(48,54,61,.5); }
  .kv:last-child { border-bottom: none; }
  .kv-key { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kv-val { font-family: var(--mono); font-size: 12px; font-weight: 600; white-space: nowrap; }
  .pos { color: var(--accent2); }
  .neg { color: var(--danger); }
  .neu { color: var(--text); }

  /* Financials table */
  .table-wrap { overflow-x: auto; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: right; padding: 8px 12px; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  thead th:first-child { text-align: left; }
  tbody td { text-align: right; padding: 8px 12px; font-family: var(--mono); font-size: 12px; border-bottom: 1px solid rgba(48,54,61,.3); white-space: nowrap; }
  tbody td:first-child { text-align: left; color: var(--muted); font-family: inherit; }
  tbody tr:hover { background: rgba(88,166,255,.04); }
  tbody tr:last-child td { border-bottom: none; }

  /* DCF */
  .dcf-grid { display: grid; grid-template-columns: auto 1fr 1fr; gap: 20px; align-items: start; }
  @media(max-width:700px) { .dcf-grid { grid-template-columns: 1fr; } }
  .dcf-price-big { text-align: center; padding: 20px; }
  .dcf-price-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .dcf-price-val { font-family: var(--mono); font-size: 48px; font-weight: 800; color: var(--accent); line-height: 1; }
  .dcf-price-sub { color: var(--muted); font-size: 12px; margin-top: 6px; }

  /* Scenarios */
  .scenarios-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
  .scenario-card { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .scenario-card.bull { border-color: rgba(63,185,80,.4); }
  .scenario-card.bear { border-color: rgba(248,81,73,.4); }
  .scenario-card.base { border-color: rgba(88,166,255,.4); }
  .scenario-name { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
  .scenario-price { font-family: var(--mono); font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .scenario-card.bull .scenario-price { color: var(--accent2); }
  .scenario-card.bear .scenario-price { color: var(--danger); }
  .scenario-card.base .scenario-price { color: var(--accent); }
  .scenario-ev { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  /* Sensitivity table */
  .sens-wrap { overflow-x: auto; margin-bottom: 12px; }
  .sens-table { border-collapse: collapse; font-size: 12px; font-family: var(--mono); width: 100%; }
  .sens-table th { background: var(--card2); padding: 7px 12px; text-align: center; color: var(--muted); font-size: 11px; border: 1px solid var(--border); white-space: nowrap; }
  .sens-table th.row-header { text-align: right; }
  .sens-table td { padding: 7px 12px; text-align: center; border: 1px solid var(--border); cursor: default; transition: filter .1s; }
  .sens-table td:hover { filter: brightness(1.3); }
  .sens-cell-base { outline: 2px solid var(--accent) !important; outline-offset: -2px; font-weight: 700; }

  /* CF sparkline */
  .cf-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  @media(max-width:700px) { .cf-grid { grid-template-columns: repeat(2, 1fr); } }
  .cf-item { display: flex; flex-direction: column; gap: 4px; }
  .cf-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .cf-val { font-family: var(--mono); font-size: 18px; font-weight: 700; }
  .cf-sub { font-size: 11px; color: var(--muted); }
  .sparkline { display: flex; align-items: flex-end; gap: 2px; height: 28px; margin-top: 6px; }
  .spark-bar { flex: 1; min-width: 4px; border-radius: 2px 2px 0 0; transition: opacity .2s; }
  .spark-bar:hover { opacity: .7; }

  .mb-12 { margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="breadcrumb"><a href="/trading/">← Trading</a> / EDGAR Fundamentals</div>
    <h1>EDGAR Fundamentals</h1>
  </div>
  <a href="/trading/edgar/results" style="color:var(--muted);font-size:12px;text-decoration:none;border:1px solid var(--border);padding:6px 12px;border-radius:6px;transition:color .12s,border-color .12s" onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'" onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--border)'">All Results →</a>
  <div class="header-sub">SEC 10-Q / 10-K Analysis + DCF Valuation</div>
</div>

<div class="main">

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-row">
      <input id="tickerInput" class="ticker-input" type="text" placeholder="AAPL" maxlength="10" autocomplete="off" spellcheck="false">
      <select id="formSelect" class="form-select">
        <option value="10-Q">10-Q (Quarterly)</option>
        <option value="10-K">10-K (Annual)</option>
      </select>
      <select id="filingsSelect" class="form-select">
        <option value="4">4 filings</option>
        <option value="6">6 filings</option>
        <option value="8">8 filings</option>
      </select>
      <button id="analyzeBtn" class="btn btn-primary" onclick="analyze()">Analyze</button>
    </div>
    <div class="refresh-row">
      <input type="checkbox" id="forceRefresh">
      <label for="forceRefresh">Force re-fetch from EDGAR</label>
    </div>
    <div class="recent-row" id="recentRow"></div>
  </div>

  <!-- DCF Assumptions -->
  <div class="assumptions-wrap">
    <button class="assumptions-toggle" id="assumpToggle" onclick="toggleAssumptions()">
      <span class="arrow">▶</span> DCF Assumptions
    </button>
    <div class="assumptions-panel" id="assumpPanel">
      <div class="assumptions-grid">
        <div class="field"><label>WACC %</label><input id="aWacc" type="number" value="9.0" step="0.5" min="1" max="30"></div>
        <div class="field"><label>Revenue Growth %</label><input id="aGrowth" type="number" value="8.0" step="0.5" min="-20" max="100"></div>
        <div class="field"><label>Terminal Growth %</label><input id="aTg" type="number" value="2.5" step="0.25" min="0" max="5"></div>
        <div class="field"><label>Forecast Years</label><input id="aYears" type="number" value="5" step="1" min="3" max="10"></div>
        <div class="field"><label>Shares Out (M)</label><input id="aShares" type="number" placeholder="e.g. 15200" step="100"></div>
        <div class="field"><label>Net Debt (M)</label><input id="aNetDebt" type="number" placeholder="auto-detect" step="100"></div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <strong>Fetching from EDGAR...</strong>
    <p>Parsing XBRL filings — typically 30–60 seconds</p>
  </div>

  <!-- Results -->
  <div id="results"></div>

</div>

<script>
// ── Formatters ─────────────────────────────────────────────────────────────
function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v * 100).toFixed(1) + '%';
}
function fmtUsd(v, scale) {
  if (v == null || isNaN(v)) return '—';
  scale = scale || 1e9;
  const label = scale === 1e9 ? 'B' : scale === 1e6 ? 'M' : '';
  return '$' + (v / scale).toFixed(1) + label;
}
function fmtX(v) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(2) + 'x';
}
function fmtPrice(v) {
  if (v == null || isNaN(v)) return 'N/A';
  return '$' + v.toFixed(2);
}
function valClass(v, inverse) {
  if (v == null || isNaN(v)) return 'neu';
  if (inverse) return v < 0 ? 'pos' : v > 0 ? 'neg' : 'neu';
  return v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
}

// Format a metric value by key type
function fmtMetric(key, val) {
  if (val == null || (typeof val === 'number' && isNaN(val))) return { text: '—', cls: 'neu' };
  const pctKeys = /margin|roa|roe|roic|roce|ratio|yoy|qoq|yield|coverage|pct|turnover/;
  const xKeys = /turnover/;
  const usdKeys = /cash|debt|fcf|operating_cash|capex|net_income|revenue|profit|income|equity|assets|ocf/;
  let text, cls = 'neu';
  if (xKeys.test(key)) {
    text = fmtX(val);
  } else if (pctKeys.test(key)) {
    text = fmtPct(val);
    cls = val > 0 ? 'pos' : val < 0 ? 'neg' : 'neu';
    // Inverse for leverage ratios
    if (/debt|leverage/.test(key)) cls = val > 2 ? 'neg' : val > 1 ? 'neu' : 'pos';
  } else if (usdKeys.test(key)) {
    text = fmtUsd(val, 1e9);
    cls = val >= 0 ? 'pos' : 'neg';
  } else {
    text = typeof val === 'number' ? val.toFixed(2) : String(val);
  }
  return { text, cls };
}

function prettyKey(k) {
  return k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ── Toggle assumptions ─────────────────────────────────────────────────────
function toggleAssumptions() {
  const btn = document.getElementById('assumpToggle');
  const panel = document.getElementById('assumpPanel');
  btn.classList.toggle('open');
  panel.classList.toggle('open');
}

// ── Analyze ────────────────────────────────────────────────────────────────
async function analyze(ticker) {
  ticker = ticker || document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) { showError('Enter a ticker symbol.'); return; }

  document.getElementById('tickerInput').value = ticker;
  showError('');
  setLoading(true);
  document.getElementById('results').style.display = 'none';

  const body = {
    ticker,
    form:           document.getElementById('formSelect').value,
    filings:        parseInt(document.getElementById('filingsSelect').value),
    force_refresh:  document.getElementById('forceRefresh').checked,
    wacc:           parseFloat(document.getElementById('aWacc').value) / 100,
    growth:         parseFloat(document.getElementById('aGrowth').value) / 100,
    terminal_growth: parseFloat(document.getElementById('aTg').value) / 100,
    years:          parseInt(document.getElementById('aYears').value),
  };
  const shares = document.getElementById('aShares').value;
  const netDebt = document.getElementById('aNetDebt').value;
  if (shares) body.shares = parseFloat(shares);
  if (netDebt) body.net_debt = parseFloat(netDebt);

  try {
    const res = await fetch('/api/edgar/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Request failed'); setLoading(false); return; }
    setLoading(false);
    renderResults(data);
    loadTickers();
  } catch (e) {
    showError('Network error: ' + e.message);
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('analyzeBtn').disabled = on;
}
function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderResults(d) {
  const el = document.getElementById('results');
  el.innerHTML = buildResults(d);
  el.style.display = 'block';
}

function buildResults(d) {
  const m = d.metrics || {};
  const dcf = d.dcf || {};
  const scen = d.scenarios || {};
  const sens = d.sensitivity;

  // Last row helper
  function lastRow(arr) {
    return (arr && arr.length) ? arr[arr.length - 1] : {};
  }

  const profLast = lastRow(m.profitability);
  const liqLast  = lastRow(m.liquidity);
  const effLast  = lastRow(m.efficiency);
  const growLast = lastRow(m.growth);
  const cfLast   = lastRow(m.cf_quality);

  // Profitability keys to display
  const profKeys = ['gross_margin','operating_margin','net_margin','ebitda_margin','roa','roe','roic','roce'];
  const liqKeys  = ['current_ratio','quick_ratio','cash_ratio','debt_to_equity','debt_to_assets','net_debt_ebitda','interest_coverage'];
  const effKeys  = ['asset_turnover','fixed_asset_turnover','inventory_turnover','dio','receivables_turnover','dso','dpo','cash_conversion_cycle'];
  const growKeys = ['revenue_yoy','revenue_qoq','gross_profit_yoy','operating_income_yoy','net_income_yoy','eps_diluted_yoy','fcf_yoy'];

  function kvList(keys, row) {
    return keys.map(k => {
      const v = row[k];
      const { text, cls } = fmtMetric(k, v);
      return `<div class="kv"><span class="kv-key">${prettyKey(k)}</span><span class="kv-val ${cls}">${text}</span></div>`;
    }).join('');
  }

  // Historical financials table
  const finRows = (d.financials || []).slice(-8);
  const finTable = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Period</th>
          <th>Revenue</th>
          <th>Gross Profit</th>
          <th>Op. Income</th>
          <th>Net Income</th>
          <th>FCF</th>
        </tr></thead>
        <tbody>
          ${finRows.map(r => {
            const fcf = r.operating_cash_flow != null && r.capex != null
              ? r.operating_cash_flow - Math.abs(r.capex) : null;
            return `<tr>
              <td>${r.period_end || '—'}</td>
              <td>${r.revenue != null ? fmtUsd(r.revenue) : '—'}</td>
              <td>${r.gross_profit != null ? fmtUsd(r.gross_profit) : '—'}</td>
              <td class="${r.operating_income >= 0 ? 'pos' : 'neg'}">${r.operating_income != null ? fmtUsd(r.operating_income) : '—'}</td>
              <td class="${r.net_income >= 0 ? 'pos' : 'neg'}">${r.net_income != null ? fmtUsd(r.net_income) : '—'}</td>
              <td class="${fcf != null ? (fcf >= 0 ? 'pos' : 'neg') : ''}">${fcf != null ? fmtUsd(fcf) : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  // CF quality section with sparklines
  function sparkline(arr, positive) {
    if (!arr || !arr.length) return '';
    const vals = arr.filter(v => v != null && !isNaN(v));
    if (!vals.length) return '';
    const max = Math.max(...vals.map(Math.abs));
    return `<div class="sparkline">${vals.map(v => {
      const h = max > 0 ? Math.max(3, Math.round((Math.abs(v) / max) * 24)) : 4;
      const color = v >= 0 ? '#3fb950' : '#f85149';
      return `<div class="spark-bar" style="height:${h}px;background:${color}" title="${fmtUsd(v)}"></div>`;
    }).join('')}</div>`;
  }

  const cfOcf = (m.cf_quality || []).map(r => r.operating_cash_flow);
  const cfFcf = (m.cf_quality || []).map(r => r.fcf_firm);

  const cfSection = `
    <div class="cf-grid">
      <div class="cf-item">
        <div class="cf-label">Operating CF</div>
        <div class="cf-val ${cfLast.operating_cash_flow >= 0 ? 'pos' : 'neg'}">${fmtUsd(cfLast.operating_cash_flow)}</div>
        ${sparkline(cfOcf)}
      </div>
      <div class="cf-item">
        <div class="cf-label">Free Cash Flow</div>
        <div class="cf-val ${cfLast.fcf_firm >= 0 ? 'pos' : 'neg'}">${fmtUsd(cfLast.fcf_firm)}</div>
        ${sparkline(cfFcf)}
      </div>
      <div class="cf-item">
        <div class="cf-label">FCF Margin</div>
        <div class="cf-val ${cfLast.fcf_margin >= 0 ? 'pos' : 'neg'}">${fmtPct(cfLast.fcf_margin)}</div>
        <div class="cf-sub">of revenue</div>
      </div>
      <div class="cf-item">
        <div class="cf-label">Capex % Rev</div>
        <div class="cf-val neu">${fmtPct(cfLast.capex_pct_revenue)}</div>
        <div class="cf-sub">reinvestment rate</div>
      </div>
      <div class="cf-item">
        <div class="cf-label">OCF / Net Income</div>
        <div class="cf-val ${cfLast.ocf_to_net_income >= 1 ? 'pos' : 'neg'}">${cfLast.ocf_to_net_income != null ? cfLast.ocf_to_net_income.toFixed(2) : '—'}</div>
        <div class="cf-sub">${cfLast.ocf_to_net_income >= 1 ? 'quality earnings' : 'watch accruals'}</div>
      </div>
    </div>`;

  // DCF section
  const dcfSection = `
    <div class="dcf-grid">
      <div class="dcf-price-big">
        <div class="dcf-price-label">Implied Price</div>
        <div class="dcf-price-val">${dcf.implied_price != null ? fmtPrice(dcf.implied_price) : 'N/A'}</div>
        <div class="dcf-price-sub">per share</div>
      </div>
      <div class="kv-list">
        ${[
          ['Enterprise Value', fmtUsd(dcf.enterprise_value, 1e9)],
          ['Equity Value', fmtUsd(dcf.equity_value, 1e9)],
          ['WACC', fmtPct(dcf.wacc)],
          ['Terminal Value %', fmtPct(dcf.terminal_value_pct)],
          ['PV of FCFs', fmtUsd(dcf.pv_fcfs, 1e9)],
        ].map(([k,v]) => `<div class="kv"><span class="kv-key">${k}</span><span class="kv-val neu">${v}</span></div>`).join('')}
      </div>
      <div class="kv-list">
        <div class="section-title" style="margin-bottom:8px">Assumptions</div>
        ${[
          ['Revenue Growth', fmtPct(dcf.assumptions?.revenue_growth)],
          ['EBITDA Margin', fmtPct(dcf.assumptions?.ebitda_margin)],
          ['Terminal Growth', fmtPct(dcf.assumptions?.terminal_growth)],
          ['Forecast Years', dcf.assumptions?.forecast_years + 'y'],
          ['Tax Rate', fmtPct(dcf.assumptions?.tax_rate)],
        ].map(([k,v]) => `<div class="kv"><span class="kv-key">${k}</span><span class="kv-val neu">${v}</span></div>`).join('')}
      </div>
    </div>`;

  // Scenarios
  const scenOrder = ['bear','base','bull'];
  const scenLabels = { bear:'Bear', base:'Base', bull:'Bull' };
  const scenSection = `
    <div class="scenarios-grid">
      ${scenOrder.filter(s => scen[s]).map(s => `
        <div class="scenario-card ${s}">
          <div class="scenario-name">${scenLabels[s]}</div>
          <div class="scenario-price">${scen[s].implied_price != null ? fmtPrice(scen[s].implied_price) : 'N/A'}</div>
          <div class="scenario-ev">EV ${fmtUsd(scen[s].enterprise_value, 1e9)}</div>
        </div>`).join('')}
    </div>`;

  // Sensitivity table
  let sensSection = '';
  if (sens) {
    // Find mid WACC / mid tg as base cell
    const midWRow = Math.floor(sens.index.length / 2);
    const midGCol = Math.floor(sens.columns.length / 2);
    const vals = sens.data.flat().filter(v => v != null);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    function heatColor(v) {
      if (v == null) return 'background:#161b22';
      const t = (v - minV) / (maxV - minV || 1);
      const r = Math.round(248 * (1-t) + 30 * t);
      const g = Math.round(81 * (1-t) + 185 * t);
      const b = Math.round(73 * (1-t) + 80 * t);
      return `background:rgba(${r},${g},${b},0.25)`;
    }
    sensSection = `
      <div class="sens-wrap">
        <table class="sens-table">
          <thead><tr>
            <th class="row-header">WACC \\ g</th>
            ${sens.columns.map(c => `<th>${c}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${sens.data.map((row, ri) => `<tr>
              <th class="row-header" style="background:var(--card2)">${sens.index[ri]}</th>
              ${row.map((v, ci) => {
                const isBase = ri === midWRow && ci === midGCol;
                return `<td style="${heatColor(v)}" class="${isBase ? 'sens-cell-base' : ''}">${v != null ? '$'+v+'B' : '—'}</td>`;
              }).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // Flags
  const flagsHtml = (d.metrics?.flags || []).length
    ? `<div class="flags-wrap">${(d.metrics.flags).map(f => `<span class="flag">${f}</span>`).join('')}</div>`
    : '';

  return `
    <!-- Summary -->
    <div class="summary-bar mb-12">
      <div class="summary-item"><div class="summary-label">Ticker</div><div class="summary-val">${d.ticker}</div></div>
      <div class="summary-item"><div class="summary-label">Form</div><div class="summary-val">${d.form}</div></div>
      <div class="summary-item"><div class="summary-label">Date Range</div><div class="summary-val" style="font-size:13px">${(d.date_range||[]).join(' → ')}</div></div>
      <div class="summary-item"><div class="summary-label">Periods</div><div class="summary-val">${d.periods}</div></div>
    </div>

    ${flagsHtml}

    <!-- Metrics grid -->
    <div class="card-grid mb-12">
      <div class="card"><div class="section-title">Profitability</div><div class="kv-list">${kvList(profKeys, profLast)}</div></div>
      <div class="card"><div class="section-title">Liquidity &amp; Solvency</div><div class="kv-list">${kvList(liqKeys, liqLast)}</div></div>
      <div class="card"><div class="section-title">Efficiency</div><div class="kv-list">${kvList(effKeys, effLast)}</div></div>
      <div class="card"><div class="section-title">Growth Rates</div><div class="kv-list">${kvList(growKeys, growLast)}</div></div>
    </div>

    <!-- Cash Flow -->
    <div class="card mb-12">
      <div class="section-title">Cash Flow Quality</div>
      ${cfSection}
    </div>

    <!-- Historical table -->
    <div class="card mb-12">
      <div class="section-title">Historical Financials (last 8 quarters, $B)</div>
      ${finTable}
    </div>

    <!-- DCF -->
    <div class="card mb-12">
      <div class="section-title">DCF Valuation</div>
      ${dcfSection}
    </div>

    <!-- Scenarios -->
    <div class="card mb-12">
      <div class="section-title">Scenario Analysis</div>
      ${scenSection}
    </div>

    ${sens ? `<div class="card mb-12">
      <div class="section-title">Sensitivity — Enterprise Value ($B) · WACC vs Terminal Growth</div>
      ${sensSection}
    </div>` : ''}
  `;
}

// ── Recent tickers ─────────────────────────────────────────────────────────
async function loadTickers() {
  try {
    const res = await fetch('/api/edgar/tickers');
    if (!res.ok) return;
    const data = await res.json();
    const row = document.getElementById('recentRow');
    row.innerHTML = (data.tickers || []).map(t =>
      `<span class="chip" onclick="analyze('${t}')">${t}</span>`
    ).join('');
  } catch {}
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('tickerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
  e.target.value = e.target.value.toUpperCase();
});
document.getElementById('tickerInput').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});

loadTickers();

// Pre-fill ticker from ?ticker= URL param and auto-analyze
(function() {
  const p = new URLSearchParams(window.location.search);
  const t = (p.get('ticker') || '').toUpperCase().trim();
  if (t) {
    document.getElementById('tickerInput').value = t;
    analyze();
  }
})();
</script>
</body>
</html>
